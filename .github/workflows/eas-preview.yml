name: EAS preview

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eas-build:
    runs-on: ubuntu-latest
    if: ${{ vars['HAS_EXPO_TOKEN'] == 'true' }}
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets['EXPO_TOKEN'] }}
      - run: pnpm install --frozen-lockfile
      - name: Verify mobile preview env
        env:
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars['EXPO_PUBLIC_EAS_PROJECT_ID'] }}
        shell: bash
        run: |
          if [[ -z "$EXPO_PUBLIC_EAS_PROJECT_ID" ]]; then
            echo "::warning::EXPO_PUBLIC_EAS_PROJECT_ID is not configured. Preview builds still work, but Expo Updates and deterministic project linkage stay implicit."
          fi
      - name: Build Android preview
        id: eas_build
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars['EXPO_PUBLIC_EAS_PROJECT_ID'] }}
        run: |
          set +e
          eas build --profile preview --platform android --non-interactive --json > eas-build.json 2> eas-build.stderr
          eas_exit_code=$?
          set -e

          if [[ $eas_exit_code -ne 0 ]]; then
            if grep -qi "used its Android builds from the Free plan this month" eas-build.stderr; then
              echo "::warning::EAS Android preview quota exhausted for the month. Marking preview as blocked, not failed."
              {
                echo "build_id="
                echo "details_url="
                echo "artifact_url="
                echo "status=quota_blocked"
                echo "quota_blocked=true"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi

            cat eas-build.stderr
            exit "$eas_exit_code"
          fi

          node <<'NODE'
          const fs = require('node:fs');

          const payload = JSON.parse(fs.readFileSync('eas-build.json', 'utf8'));
          const build = Array.isArray(payload) ? payload[0] : payload;
          if (!build || typeof build !== 'object') {
            throw new Error('Unexpected EAS build payload');
          }

          const outputPath = process.env.GITHUB_OUTPUT;
          if (!outputPath) {
            throw new Error('GITHUB_OUTPUT is not set');
          }

          const buildId = build.id ? String(build.id) : '';
          const detailsUrl = build.detailsPageUrl || build.webpageUrl || '';
          const artifactUrl = build.artifacts?.buildUrl ? String(build.artifacts.buildUrl) : '';

          fs.appendFileSync(outputPath, `build_id=${buildId}\n`, 'utf8');
          fs.appendFileSync(outputPath, `details_url=${detailsUrl}\n`, 'utf8');
          fs.appendFileSync(outputPath, `artifact_url=${artifactUrl}\n`, 'utf8');
          fs.appendFileSync(outputPath, 'status=queued\n', 'utf8');
          fs.appendFileSync(outputPath, 'quota_blocked=false\n', 'utf8');
          NODE
      - name: Publish preview summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Android Preview Build"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Status: ${{ steps.eas_build.outputs.status || 'failed' }}"
            echo "- Build ID: ${{ steps.eas_build.outputs.build_id || 'n/a' }}"
            echo "- Details: ${{ steps.eas_build.outputs.details_url || 'n/a' }}"
            echo "- Artifact: ${{ steps.eas_build.outputs.artifact_url || 'n/a' }}"
            if [[ "${{ steps.eas_build.outputs.quota_blocked || 'false' }}" == "true" ]]; then
              echo "- Quota: Monthly Expo Android preview quota exhausted. Build dispatch skipped until quota reset or paid capacity is enabled."
            fi
            echo "- To expose this build on the live website, copy the artifact URL into the GitHub variable ANDROID_PREVIEW_URL and redeploy the web workflow."
          } >> "$GITHUB_STEP_SUMMARY"
