name: EAS preview

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eas-build:
    runs-on: ubuntu-latest
    if: ${{ vars['HAS_EXPO_TOKEN'] == 'true' }}
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets['EXPO_TOKEN'] }}
      - run: pnpm install --frozen-lockfile
      - name: Verify mobile preview env
        env:
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars['EXPO_PUBLIC_EAS_PROJECT_ID'] }}
        shell: bash
        run: |
          if [[ -z "$EXPO_PUBLIC_EAS_PROJECT_ID" ]]; then
            echo "::warning::EXPO_PUBLIC_EAS_PROJECT_ID is not configured. Preview builds still work, but Expo Updates and deterministic project linkage stay implicit."
          fi
      - name: Build Android preview
        id: eas_build
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars['EXPO_PUBLIC_EAS_PROJECT_ID'] }}
        run: |
          eas build --profile preview --platform android --non-interactive --json > eas-build.json
          node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('eas-build.json','utf8')); const build=Array.isArray(payload)?payload[0]:payload; if(!build){process.exit(1);} const buildId=build.id ?? ''; const detailsUrl=build.detailsPageUrl ?? build.artifacts?.buildUrl ?? ''; const artifactUrl=build.artifacts?.buildUrl ?? ''; fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_id=${buildId}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `details_url=${detailsUrl}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `artifact_url=${artifactUrl}\n`);"
      - name: Publish preview summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Android Preview Build"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Build ID: ${{ steps.eas_build.outputs.build_id || 'n/a' }}"
            echo "- Details: ${{ steps.eas_build.outputs.details_url || 'n/a' }}"
            echo "- Artifact: ${{ steps.eas_build.outputs.artifact_url || 'n/a' }}"
            echo "- To expose this build on the live website, copy the artifact URL into the GitHub variable ANDROID_PREVIEW_URL and redeploy the web workflow."
          } >> "$GITHUB_STEP_SUMMARY"
