name: Firebase Hosting

on:
  push:
    branches: [main, claude/mobile-ai-audio-app-WMM4b]
    paths:
      - '.github/workflows/firebase-hosting.yml'
      - '.firebaserc'
      - 'firebase.json'
      - 'firestore.indexes.json'
      - 'firestore.rules'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/**'
      - 'storage.rules'
      - 'turbo.json'
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check deploy secrets
        shell: bash
        env:
          HAS_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
          HAS_PID: ${{ secrets.FIREBASE_PROJECT_ID != '' }}
          HAS_API_KEY: ${{ secrets['NEXT_PUBLIC_FIREBASE_API_KEY'] != '' }}
          HAS_AUTH_DOMAIN: ${{ secrets['NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'] != '' }}
          HAS_WEB_PID: ${{ secrets['NEXT_PUBLIC_FIREBASE_PROJECT_ID'] != '' }}
          HAS_STORAGE_BUCKET: ${{ secrets['NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'] != '' }}
          HAS_SENDER_ID: ${{ secrets['NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'] != '' }}
          HAS_APP_ID: ${{ secrets['NEXT_PUBLIC_FIREBASE_APP_ID'] != '' }}
          HAS_INTERNAL_JOBS_SECRET: ${{ secrets['INTERNAL_JOBS_SECRET'] != '' }}
          HAS_WHATSAPP_TOKEN: ${{ secrets['WHATSAPP_CLOUD_ACCESS_TOKEN'] != '' }}
          HAS_WHATSAPP_PHONE_ID: ${{ secrets['WHATSAPP_CLOUD_PHONE_NUMBER_ID'] != '' }}
          HAS_EMAIL_WEBHOOK_URL: ${{ secrets['EMAIL_NOTIFICATIONS_WEBHOOK_URL'] != '' }}
          HAS_EMAIL_WEBHOOK_TOKEN: ${{ secrets['EMAIL_NOTIFICATIONS_WEBHOOK_TOKEN'] != '' }}
          HAS_OPENAI_API_KEY: ${{ secrets['OPENAI_API_KEY'] != '' }}
          HAS_GROQ_API_KEY: ${{ secrets['GROQ_API_KEY'] != '' }}
          HAS_LOCAL_WHISPER_URL: ${{ vars['LOCAL_WHISPER_URL'] != '' }}
          AUDIO_EDITING_FLAG: ${{ vars['NEXT_PUBLIC_FF_AUDIO_EDITING_V1'] || 'false' }}
          NOTIFICATIONS_FLAG: ${{ vars['NEXT_PUBLIC_FF_NOTIFICATIONS_V1'] || 'false' }}
        run: |
          missing=()
          [[ "$HAS_SA"             == "true" ]] || missing+=("FIREBASE_SERVICE_ACCOUNT")
          [[ "$HAS_PID"            == "true" ]] || missing+=("FIREBASE_PROJECT_ID")
          [[ "$HAS_API_KEY"        == "true" ]] || missing+=("NEXT_PUBLIC_FIREBASE_API_KEY")
          [[ "$HAS_AUTH_DOMAIN"    == "true" ]] || missing+=("NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN")
          [[ "$HAS_WEB_PID"        == "true" ]] || missing+=("NEXT_PUBLIC_FIREBASE_PROJECT_ID")
          [[ "$HAS_STORAGE_BUCKET" == "true" ]] || missing+=("NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET")
          [[ "$HAS_SENDER_ID"      == "true" ]] || missing+=("NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID")
          [[ "$HAS_APP_ID"         == "true" ]] || missing+=("NEXT_PUBLIC_FIREBASE_APP_ID")

          if [[ "$AUDIO_EDITING_FLAG" == "true" && "$HAS_INTERNAL_JOBS_SECRET" != "true" ]]; then
            missing+=("INTERNAL_JOBS_SECRET (required when NEXT_PUBLIC_FF_AUDIO_EDITING_V1=true)")
          fi

          if (( ${#missing[@]} )); then
            echo "::error::Missing required GitHub secrets for deploy: ${missing[*]}. See docs/deploy-setup.md §1."
            exit 1
          fi

          if [[ "$NOTIFICATIONS_FLAG" == "true" ]]; then
            if [[ "$HAS_WHATSAPP_TOKEN" != "true" || "$HAS_WHATSAPP_PHONE_ID" != "true" ]]; then
              echo "::warning::NEXT_PUBLIC_FF_NOTIFICATIONS_V1=true but WhatsApp Cloud credentials are incomplete."
            fi
            if [[ "$HAS_EMAIL_WEBHOOK_URL" != "true" ]]; then
              echo "::warning::NEXT_PUBLIC_FF_NOTIFICATIONS_V1=true but EMAIL_NOTIFICATIONS_WEBHOOK_URL is missing."
            fi
            if [[ "$HAS_EMAIL_WEBHOOK_TOKEN" != "true" ]]; then
              echo "::warning::NEXT_PUBLIC_FF_NOTIFICATIONS_V1=true but EMAIL_NOTIFICATIONS_WEBHOOK_TOKEN is missing."
            fi
          fi

          if [[ "$HAS_OPENAI_API_KEY" != "true" && "$HAS_GROQ_API_KEY" != "true" && "$HAS_LOCAL_WHISPER_URL" != "true" ]]; then
            echo "::warning::No transcription path configured for runtime (missing OPENAI_API_KEY, GROQ_API_KEY, and LOCAL_WHISPER_URL)."
          fi

          echo "All deploy secrets present — proceeding with web deploy."

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate service account JSON
        shell: bash
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if ! printf '%s' "$SA_JSON" | python3 -c 'import json,sys; json.load(sys.stdin)' 2>/dev/null; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT is not valid JSON. Open the service-account file in a plain-text editor (VS Code / nano / cat), copy every character from '{' to '}', and re-paste into GitHub Secrets. Files saved as UTF-16 or with a BOM will fail here."
            exit 1
          fi
          if ! printf '%s' "$SA_JSON" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d.get("type")=="service_account", "missing type"; assert d.get("private_key"), "missing private_key"; assert d.get("client_email"), "missing client_email"'; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT parses but is missing required fields (type/private_key/client_email). Re-download from Firebase Console → Project Settings → Service accounts → Generate new private key."
            exit 1
          fi
          echo "FIREBASE_SERVICE_ACCOUNT looks good."

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets['NEXT_PUBLIC_FIREBASE_API_KEY'] }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets['NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'] }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets['NEXT_PUBLIC_FIREBASE_PROJECT_ID'] }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets['NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'] }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets['NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'] }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets['NEXT_PUBLIC_FIREBASE_APP_ID'] }}
          NEXT_PUBLIC_FIRESTORE_DATABASE_ID: anotes
          NEXT_PUBLIC_APP_URL: https://anotes.web.app
        run: |
          pnpm lint
          pnpm typecheck

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy Firebase platform config
        env:
          FIREBASE_PID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          pnpm exec firebase deploy \
            --only firestore:indexes,firestore:rules,storage \
            --project "$FIREBASE_PID" \
            --non-interactive \
            --force

      - name: Wait for Firestore indexes
        env:
          FIREBASE_PID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          node scripts/wait-firestore-indexes.mjs \
            --project "$FIREBASE_PID" \
            --database anotes \
            --timeout-ms 900000

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe gravador-web \
            --location us-central1 \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create gravador-web \
            --repository-format=docker \
            --location=us-central1 \
            --description="Gravador web containers" \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Build and publish web container
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gcloud builds submit \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --region us-central1 \
            --service-account "projects/${{ secrets.FIREBASE_PROJECT_ID }}/serviceAccounts/hocapp-44760@appspot.gserviceaccount.com" \
            --config infra/cloudbuild/web.yaml \
            --substitutions _IMAGE_URI=us-central1-docker.pkg.dev/${{ secrets.FIREBASE_PROJECT_ID }}/gravador-web/anotes-web,_NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets['NEXT_PUBLIC_FIREBASE_API_KEY'] }},_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets['NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'] }},_NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets['NEXT_PUBLIC_FIREBASE_PROJECT_ID'] }},_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets['NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'] }},_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets['NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'] }},_NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets['NEXT_PUBLIC_FIREBASE_APP_ID'] }},_NEXT_PUBLIC_FIRESTORE_DATABASE_ID=anotes,_NEXT_PUBLIC_APP_URL=https://anotes.web.app,_NEXT_PUBLIC_ADMIN_EMAILS=${{ vars['NEXT_PUBLIC_ADMIN_EMAILS'] || '' }},_NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS=${{ vars['NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS'] || 'true' }},_NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1=${{ vars['NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1'] || 'false' }},_NEXT_PUBLIC_FF_AUDIO_EDITING_V1=${{ vars['NEXT_PUBLIC_FF_AUDIO_EDITING_V1'] || 'false' }},_NEXT_PUBLIC_FF_NOTIFICATIONS_V1=${{ vars['NEXT_PUBLIC_FF_NOTIFICATIONS_V1'] || 'false' }},_NEXT_PUBLIC_FF_BULK_OPS_V1=${{ vars['NEXT_PUBLIC_FF_BULK_OPS_V1'] || 'false' }},_NEXT_PUBLIC_COMMIT_SHA=${COMMIT_SHA},_NEXT_PUBLIC_BUILD_TIME=${BUILD_TIME} \
            .

      - name: Deploy Cloud Run service
        id: deploy_cloud_run
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: hocapp-44760.firebasestorage.app
          ANDROID_PREVIEW_URL: ${{ vars['ANDROID_PREVIEW_URL'] }}
          INTERNAL_WEBHOOK_SECRET: ${{ secrets['INTERNAL_WEBHOOK_SECRET'] }}
          INTERNAL_JOBS_SECRET: ${{ secrets['INTERNAL_JOBS_SECRET'] }}
          AUDIO_EDIT_EXECUTOR_BASE_URL: ${{ vars['AUDIO_EDIT_EXECUTOR_BASE_URL'] }}
          WHATSAPP_CLOUD_ACCESS_TOKEN: ${{ secrets['WHATSAPP_CLOUD_ACCESS_TOKEN'] }}
          WHATSAPP_CLOUD_PHONE_NUMBER_ID: ${{ secrets['WHATSAPP_CLOUD_PHONE_NUMBER_ID'] }}
          WHATSAPP_CLOUD_VERIFY_TOKEN: ${{ secrets['WHATSAPP_CLOUD_VERIFY_TOKEN'] }}
          WHATSAPP_CLOUD_APP_SECRET: ${{ secrets['WHATSAPP_CLOUD_APP_SECRET'] }}
          EMAIL_NOTIFICATIONS_WEBHOOK_URL: ${{ secrets['EMAIL_NOTIFICATIONS_WEBHOOK_URL'] }}
          EMAIL_NOTIFICATIONS_WEBHOOK_TOKEN: ${{ secrets['EMAIL_NOTIFICATIONS_WEBHOOK_TOKEN'] }}
          NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS: ${{ vars['NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS'] }}
          NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1: ${{ vars['NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1'] }}
          NEXT_PUBLIC_FF_AUDIO_EDITING_V1: ${{ vars['NEXT_PUBLIC_FF_AUDIO_EDITING_V1'] }}
          NEXT_PUBLIC_FF_NOTIFICATIONS_V1: ${{ vars['NEXT_PUBLIC_FF_NOTIFICATIONS_V1'] }}
          NEXT_PUBLIC_FF_BULK_OPS_V1: ${{ vars['NEXT_PUBLIC_FF_BULK_OPS_V1'] }}
          OPENAI_API_KEY: ${{ secrets['OPENAI_API_KEY'] }}
          ANTHROPIC_API_KEY: ${{ secrets['ANTHROPIC_API_KEY'] }}
          GROQ_API_KEY: ${{ secrets['GROQ_API_KEY'] }}
          LOCAL_WHISPER_URL: ${{ vars['LOCAL_WHISPER_URL'] }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets['GOOGLE_GENERATIVE_AI_API_KEY'] }}
        run: |
          env_vars="NEXT_PUBLIC_APP_URL=https://anotes.web.app,FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET,FIRESTORE_DATABASE_ID=anotes,NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS=${NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS:-true},NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1=${NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1:-false},NEXT_PUBLIC_FF_AUDIO_EDITING_V1=${NEXT_PUBLIC_FF_AUDIO_EDITING_V1:-false},NEXT_PUBLIC_FF_NOTIFICATIONS_V1=${NEXT_PUBLIC_FF_NOTIFICATIONS_V1:-false},NEXT_PUBLIC_FF_BULK_OPS_V1=${NEXT_PUBLIC_FF_BULK_OPS_V1:-false}"
          if [[ -n "$ANDROID_PREVIEW_URL" ]]; then
            env_vars="$env_vars,ANDROID_PREVIEW_URL=$ANDROID_PREVIEW_URL"
          fi
          if [[ -n "$INTERNAL_WEBHOOK_SECRET" ]]; then
            env_vars="$env_vars,INTERNAL_WEBHOOK_SECRET=$INTERNAL_WEBHOOK_SECRET"
          fi
          if [[ -n "$INTERNAL_JOBS_SECRET" ]]; then
            env_vars="$env_vars,INTERNAL_JOBS_SECRET=$INTERNAL_JOBS_SECRET"
          fi
          if [[ -n "$AUDIO_EDIT_EXECUTOR_BASE_URL" ]]; then
            env_vars="$env_vars,AUDIO_EDIT_EXECUTOR_BASE_URL=$AUDIO_EDIT_EXECUTOR_BASE_URL"
          fi
          if [[ -n "$WHATSAPP_CLOUD_ACCESS_TOKEN" ]]; then
            env_vars="$env_vars,WHATSAPP_CLOUD_ACCESS_TOKEN=$WHATSAPP_CLOUD_ACCESS_TOKEN"
          fi
          if [[ -n "$WHATSAPP_CLOUD_PHONE_NUMBER_ID" ]]; then
            env_vars="$env_vars,WHATSAPP_CLOUD_PHONE_NUMBER_ID=$WHATSAPP_CLOUD_PHONE_NUMBER_ID"
          fi
          if [[ -n "$WHATSAPP_CLOUD_VERIFY_TOKEN" ]]; then
            env_vars="$env_vars,WHATSAPP_CLOUD_VERIFY_TOKEN=$WHATSAPP_CLOUD_VERIFY_TOKEN"
          fi
          if [[ -n "$WHATSAPP_CLOUD_APP_SECRET" ]]; then
            env_vars="$env_vars,WHATSAPP_CLOUD_APP_SECRET=$WHATSAPP_CLOUD_APP_SECRET"
          fi
          if [[ -n "$EMAIL_NOTIFICATIONS_WEBHOOK_URL" ]]; then
            env_vars="$env_vars,EMAIL_NOTIFICATIONS_WEBHOOK_URL=$EMAIL_NOTIFICATIONS_WEBHOOK_URL"
          fi
          if [[ -n "$EMAIL_NOTIFICATIONS_WEBHOOK_TOKEN" ]]; then
            env_vars="$env_vars,EMAIL_NOTIFICATIONS_WEBHOOK_TOKEN=$EMAIL_NOTIFICATIONS_WEBHOOK_TOKEN"
          fi
          if [[ -n "$OPENAI_API_KEY" ]]; then
            env_vars="$env_vars,OPENAI_API_KEY=$OPENAI_API_KEY"
          fi
          if [[ -n "$ANTHROPIC_API_KEY" ]]; then
            env_vars="$env_vars,ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
          fi
          if [[ -n "$GROQ_API_KEY" ]]; then
            env_vars="$env_vars,GROQ_API_KEY=$GROQ_API_KEY"
          fi
          if [[ -n "$LOCAL_WHISPER_URL" ]]; then
            env_vars="$env_vars,LOCAL_WHISPER_URL=$LOCAL_WHISPER_URL"
          fi
          if [[ -n "$GOOGLE_GENERATIVE_AI_API_KEY" ]]; then
            env_vars="$env_vars,GOOGLE_GENERATIVE_AI_API_KEY=$GOOGLE_GENERATIVE_AI_API_KEY"
          fi

          gcloud run deploy anotes-web \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --region us-central1 \
            --image "us-central1-docker.pkg.dev/${{ secrets.FIREBASE_PROJECT_ID }}/gravador-web/anotes-web:latest" \
            --service-account hocapp-44760@appspot.gserviceaccount.com \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --concurrency 80 \
            --max-instances 10 \
            --update-env-vars "$env_vars"

          service_url=$(gcloud run services describe anotes-web \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --region us-central1 \
            --format='value(status.url)')
          revision=$(gcloud run services describe anotes-web \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --region us-central1 \
            --format='value(status.latestReadyRevisionName)')
          echo "service_url=$service_url" >> "$GITHUB_OUTPUT"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Deploy Hosting rewrite
        env:
          FIREBASE_PID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          pnpm exec firebase deploy \
            --only hosting \
            --project "$FIREBASE_PID" \
            --non-interactive \
            --force

      - name: Health check public routes
        run: |
          curl --fail --silent --show-error https://anotes.web.app >/dev/null
          curl --fail --silent --show-error https://anotes.web.app/download >/dev/null
          curl --fail --silent --show-error https://anotes.web.app/api/health >/dev/null
          curl --fail --silent --show-error https://anotes.web.app/login >/dev/null

      - name: Publish deploy summary
        env:
          ANDROID_PREVIEW_URL: ${{ vars['ANDROID_PREVIEW_URL'] }}
        shell: bash
        run: |
          preview_url="${ANDROID_PREVIEW_URL:-not configured}"
          {
            echo "## Production Web Deploy"
            echo ""
            echo "- Cloud Run service: ${{ steps.deploy_cloud_run.outputs.service_url }}"
            echo "- Ready revision: ${{ steps.deploy_cloud_run.outputs.revision }}"
            echo "- Hosting URL: https://anotes.web.app"
            echo "- Android preview URL: $preview_url"
          } >> "$GITHUB_STEP_SUMMARY"
