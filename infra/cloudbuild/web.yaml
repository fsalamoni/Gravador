steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/docker/Dockerfile.web
      - -t
      - ${_IMAGE_URI}:${BUILD_ID}
      - -t
      - ${_IMAGE_URI}:latest
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - --build-arg
      - NEXT_PUBLIC_FIRESTORE_DATABASE_ID=${_NEXT_PUBLIC_FIRESTORE_DATABASE_ID}
      - --build-arg
      - NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}
      - --build-arg
      - NEXT_PUBLIC_ADMIN_EMAILS=${_NEXT_PUBLIC_ADMIN_EMAILS}
      - --build-arg
      - NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS=${_NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS}
      - --build-arg
      - NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1=${_NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1}
      - --build-arg
      - NEXT_PUBLIC_FF_AUDIO_EDITING_V1=${_NEXT_PUBLIC_FF_AUDIO_EDITING_V1}
      - --build-arg
      - NEXT_PUBLIC_FF_NOTIFICATIONS_V1=${_NEXT_PUBLIC_FF_NOTIFICATIONS_V1}
      - --build-arg
      - NEXT_PUBLIC_FF_BULK_OPS_V1=${_NEXT_PUBLIC_FF_BULK_OPS_V1}
      - --build-arg
      - NEXT_PUBLIC_COMMIT_SHA=${_NEXT_PUBLIC_COMMIT_SHA}
      - --build-arg
      - NEXT_PUBLIC_BUILD_TIME=${_NEXT_PUBLIC_BUILD_TIME}
      - .
images:
  - ${_IMAGE_URI}:${BUILD_ID}
  - ${_IMAGE_URI}:latest

substitutions:
  _NEXT_PUBLIC_FIRESTORE_DATABASE_ID: ''
  _NEXT_PUBLIC_APP_URL: ''
  _NEXT_PUBLIC_ADMIN_EMAILS: ''
  _NEXT_PUBLIC_FF_WORKSPACE_DOWNLOADS: 'true'
  _NEXT_PUBLIC_FF_RECORDING_LIFECYCLE_V1: 'false'
  _NEXT_PUBLIC_FF_AUDIO_EDITING_V1: 'false'
  _NEXT_PUBLIC_FF_NOTIFICATIONS_V1: 'false'
  _NEXT_PUBLIC_FF_BULK_OPS_V1: 'false'
  _NEXT_PUBLIC_COMMIT_SHA: ''
  _NEXT_PUBLIC_BUILD_TIME: ''

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE